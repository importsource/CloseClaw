# CloseClaw default configuration

[gateway]
bind = "127.0.0.1"
port = 3000

[[agents]]
id = "default"
name = "CloseClaw Agent"
tools = ["exec", "read_file", "write_file", "web_fetch", "web_search"]
# soul_md = "SOUL.md"
# skills_dir = "skills"

[[channels]]
type = "cli"
enabled = true

[[channels]]
type = "webchat"
enabled = true

# [[channels]]
# type = "telegram"
# enabled = true
# token_env = "TELOXIDE_TOKEN"  # env var containing bot token from @BotFather

[llm]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
max_iterations = 25

# Authentication mode: "api_key" (default) or "oauth_token" (Claude Code compatible)
auth_mode = "api_key"

# For api_key mode: env var containing the API key
api_key_env = "ANTHROPIC_API_KEY"

# For oauth_token mode: env var containing the OAuth token.
# Falls back to reading Claude Code's keychain entry on macOS.
# token_env = "CLAUDE_CODE_TOKEN"

# workspace = "."
